version: 2    
updates:
  - directory: /
    package-ecosystem: nuget
    ignore:
      - dependency-name: BepInEx.Core
      - dependency-name: HarmonyX
      - dependency-name: UnityEngine.Modules
      - dependency-name: Microsoft.Unity.Analyzers
      - dependency-name: Harmonize
      - dependency-name: Hamunii.BepInEx.AutoPlugin
    schedule:
      interval: daily
    groups:
      silksong-libraries:
        patterns:
          - Silksong.*
        exclude-patterns:
          - Silksong.GameLibs 
  - directory: /
    package-ecosystem: github-actions
    schedule:
      interval: daily
    groups:
      artifacts:
        patterns:
          - actions/upload-artifact
          - actions/download-artifact
